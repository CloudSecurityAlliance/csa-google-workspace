version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (Dependabot updates the pin + comment).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Flag newly-disclosed CVEs / updates in the Python dependency closure.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]
