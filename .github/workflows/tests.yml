name: tests

# Runs the offline unit suite (FakeBackend — no network, no Google credentials) on
# every push to main and every PR. The live Google suite in tests/integration/ stays
# gated behind CSA_GW_INTEGRATION and is intentionally NOT run here.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit suite
        run: pytest -q
