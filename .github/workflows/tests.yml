name: tests

# Runs the offline unit suite (FakeBackend — no network, no Google credentials) on
# every push to main and every PR, plus lint + type-check. The live Google suite in
# tests/integration/ stays gated behind CSA_GW_INTEGRATION and is intentionally NOT run.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Type-check (mypy)
        run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit suite + coverage (fail_under gate from pyproject)
        run: pytest -q --cov --cov-report=term-missing

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"
      # Install the RUNTIME closure only (not [dev]) so pip-audit scans shipped deps,
      # plus the two scanners themselves.
      - name: Install package (runtime deps) + scanners
        run: |
          python -m pip install --upgrade pip
          pip install -e . pip-audit bandit
      - name: Dependency CVE scan (pip-audit)
        run: pip-audit --skip-editable
      - name: Static security analysis (bandit)
        run: bandit -r src
