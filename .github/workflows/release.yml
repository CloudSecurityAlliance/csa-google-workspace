name: release

# Publishes to PyPI when a GitHub Release is published, via PyPI Trusted Publishing
# (OIDC) — no API token is stored anywhere. One-time setup + per-release steps: RELEASING.md.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install + run the unit suite (never publish a red tag)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest -q
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Check metadata renders on PyPI
        run: |
          pip install twine
          twine check dist/*
      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
