name: release

# Publishes to PyPI when a GitHub Release is published, via PyPI Trusted Publishing
# (OIDC, no stored token) with PEP 740 attestations. Runs through a protected `pypi`
# environment (human approval). One-time setup + per-release steps: RELEASING.md.
# Actions are pinned to commit SHAs (Dependabot keeps them current).
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi          # protected environment — gates the publish behind approval
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC) + attestations
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Security gate (pip-audit + bandit, runtime closure)
        run: |
          python -m pip install --upgrade pip
          pip install -e . pip-audit bandit
          pip-audit --skip-editable
          bandit -r src
      - name: Unit suite (never publish a red tag)
        run: |
          pip install -e ".[dev]"
          pytest -q
      - name: Build sdist + wheel
        run: |
          pip install build==1.5.0 twine==6.2.0
          python -m build
      - name: Check metadata + guard dist contents
        run: |
          twine check dist/*
          # fail loudly if a probe transcript / secret / research or experiments file
          # ever sneaks into the sdist
          if tar tzf dist/*.tar.gz | grep -Ei '(^|/)(research|experiments)/|token|credential|client_secret'; then
            echo "::error::unexpected file in sdist — refusing to publish"; exit 1
          fi
      - name: Publish to PyPI (Trusted Publishing + PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  # v1.14.1
        with:
          attestations: true
