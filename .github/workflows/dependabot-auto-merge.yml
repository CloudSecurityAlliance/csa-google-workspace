name: dependabot-auto-merge

# "Track current, safely": Dependabot opens bump PRs (deps + SHA-pinned actions); this
# auto-merges the patch/minor ones once the required checks (lint/test/security) pass, so
# currency is automatic and tests are the gate. MAJOR bumps are left for a human — they're
# the ones that break. Branch protection guarantees the checks must be green before merge.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98  # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Enable auto-merge (patch/minor only; majors wait for review)
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
